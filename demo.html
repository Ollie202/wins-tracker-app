<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Money Made — Track Your Wins</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden;width:100%;font-family:'DM Sans',sans-serif}
*{-webkit-tap-highlight-color:transparent}
input,select,textarea{font-size:16px!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.reset-btn{opacity:.4;transition:opacity .3s}.reset-btn:hover{opacity:1}
.reset-tooltip{opacity:0;transition:opacity .2s;pointer-events:none;position:absolute;bottom:100%;right:0;margin-bottom:6px;white-space:nowrap;font-size:10px;padding:4px 10px;border-radius:6px;z-index:10}
.reset-btn:hover .reset-tooltip{opacity:1}
canvas{max-width:100%!important}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
"use strict";
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CHART_TYPES=["Bar","Line","Area","Radar","Pie"];
const DEFAULT_SOURCES=["Bounties","Ambassadorships","Content","Dev","Web3 Jobs","NFTs","Predictions","X Monetization","Other"];

const LIGHT={bg:"linear-gradient(180deg,#FFFCF7 0%,#F7F2EA 50%,#FFF9F0 100%)",card:"#FFFCF7",border:"#EDE6DA",text:"#3D3225",sub:"#8B7355",muted:"#BDB298",input:"#FAF6EF",inputBorder:"#E8E0D4",barBg:"#F0E9DD",accent:"#C4956A",accentGrad:"linear-gradient(90deg,#D4C5B0 0%,#C4956A 100%)",greenGrad:"linear-gradient(90deg,#C4956A 0%,#6B8E5A 100%)",green:"#6B8E5A",toggleBg:"#F0E9DD",tooltipBg:"#FFFCF7",tooltipBorder:"#E8E0D4",danger:"#C0524D",tag:"#F0E9DD",sc:{Bounties:"#C4956A",Ambassadorships:"#8B7355",Content:"#D4A574",Dev:"#A0522D","Web3 Jobs":"#9C7E5C",NFTs:"#C2A67E",Predictions:"#7A6245","X Monetization":"#B08D6A",Other:"#BDB298"}};
const DARK={bg:"linear-gradient(180deg,#1A1714 0%,#201D18 50%,#1A1714 100%)",card:"#252219",border:"#3A3530",text:"#F0E9DD",sub:"#A89880",muted:"#6B6256",input:"#2C2820",inputBorder:"#3A3530",barBg:"#2C2820",accent:"#C4956A",accentGrad:"linear-gradient(90deg,#5C4D3C 0%,#C4956A 100%)",greenGrad:"linear-gradient(90deg,#C4956A 0%,#6B8E5A 100%)",green:"#7DA86B",toggleBg:"#3A3530",tooltipBg:"#252219",tooltipBorder:"#3A3530",danger:"#D4645F",tag:"#3A3530",sc:{Bounties:"#D4A87A",Ambassadorships:"#A89880",Content:"#DEB88A",Dev:"#C0724D","Web3 Jobs":"#B09878",NFTs:"#D4BA90",Predictions:"#9A8260","X Monetization":"#C4A07A",Other:"#8A7D6E"}};

const KEY="moneymade-v2";
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const escRe=s=>s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
const fmt=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const el=(tag,attrs,children)=>{const e=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="innerHTML")e.innerHTML=v;else e.setAttribute(k,v);});if(children!==undefined){if(Array.isArray(children))children.forEach(c=>{if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c);});else if(typeof children==="string")e.textContent=children;else if(children instanceof Node)e.appendChild(children);}return e;};

let state={
  dark:localStorage.getItem("moneymade-dark")==="true",
  year:new Date().getFullYear(),
  chartType:"Bar",
  wins:[],goals:{},sources:[...DEFAULT_SOURCES],
  showAddForm:false,showGoalForm:false,showCSVPanel:false,showSourceManager:false,
  csvMode:"export",csvText:"",
  activeMonth:null,winMonth:null,editingId:null,
  sourceView:"yearly",sourceMonth:MONTHS[new Date().getMonth()],
  confirmReset:null,toast:null,editingGoalKey:null,
  addForm:{month:MONTHS[new Date().getMonth()],project:"",amount:"",source:"Bounties"},
  editForm:{month:"Jan",project:"",amount:"",source:"Bounties"},
  goalForm:{month:"Jan",target:""},
  newSource:""
};

let chart=null;
let toastTimer=null;

function load(){try{const d=JSON.parse(localStorage.getItem(KEY));if(d){if(d.wins&&d.wins.length)state.wins=d.wins;if(d.goals)state.goals=d.goals;if(d.sources&&d.sources.length)state.sources=d.sources;}}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify({wins:state.wins,goals:state.goals,sources:state.sources}));localStorage.setItem("moneymade-dark",state.dark?"true":"false");}catch(e){}}

function showToast(msg){state.toast=msg;render();clearTimeout(toastTimer);toastTimer=setTimeout(()=>{state.toast=null;render();},3000);}

function gk(m,y){return y+"-"+m;}
function yw(){return state.wins.filter(w=>w.year===state.year);}

function render(){
  const th=state.dark?DARK:LIGHT;
  const wins=yw();
  const totalEarned=wins.reduce((s,w)=>s+w.amount,0);
  const dm=state.activeMonth||MONTHS[new Date().getMonth()];
  const cGoal=state.goals[gk(dm,state.year)];
  const cEarned=wins.filter(w=>w.month===dm).reduce((s,w)=>s+w.amount,0);
  const gPct=cGoal?Math.min((cEarned/cGoal)*100,100):0;
  const exceeded=cGoal&&cEarned>cGoal;
  let bestM={m:"\u2014",t:0};MONTHS.forEach(m=>{const v=wins.filter(w=>w.month===m).reduce((s,w)=>s+w.amount,0);if(v>bestM.t)bestM={m,t:v};});
  const bestMonth=bestM.t>0?bestM.m+" ("+fmt(bestM.t)+")":"\u2014";
  const srcMap={};wins.forEach(w=>{srcMap[w.source]=(srcMap[w.source]||0)+w.amount;});
  let topSrc={n:"\u2014",t:0};Object.entries(srcMap).forEach(([n,v])=>{if(v>topSrc.t)topSrc={n,t:v};});
  const topSource=topSrc.t>0?topSrc.n:"\u2014";

  const resetTargetMonth=state.winMonth||dm;
  const displayWins=(state.winMonth?wins.filter(w=>w.month===state.winMonth):wins).sort((a,b)=>MONTHS.indexOf(a.month)-MONTHS.indexOf(b.month));
  const displayTotal=displayWins.reduce((s,w)=>s+w.amount,0);
  const srcPool=state.sourceView==="monthly"?wins.filter(w=>w.month===state.sourceMonth):wins;
  const srcTotal=srcPool.reduce((s,w)=>s+w.amount,0);
  const srcBreakMap={};srcPool.forEach(w=>{srcBreakMap[w.source]=(srcBreakMap[w.source]||0)+w.amount;});
  const srcBreak=Object.entries(srcBreakMap).sort((a,b)=>b[1]-a[1]);

  const app=$("#app");
  app.innerHTML="";
  app.style.cssText="min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden;";
  app.style.background=th.bg;
  app.style.color=th.text;
  app.style.fontFamily="'DM Sans',sans-serif";

  // Toast
  if(state.toast){
    app.appendChild(el("div",{style:{position:"fixed",top:"16px",left:"50%",transform:"translateX(-50%)",background:th.card,border:"1px solid "+th.accent,borderRadius:"10px",padding:"10px 20px",fontSize:"12px",color:th.accent,fontWeight:"600",zIndex:"100",boxShadow:"0 4px 16px rgba(0,0,0,.12)",animation:"fadeIn .2s ease"}},state.toast));
  }

  // Header
  const hdr=el("div",{style:{padding:"28px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px"}});
  const hdrL=el("div",{});
  hdrL.appendChild(el("h1",{style:{fontFamily:"'Playfair Display',serif",fontSize:"28px",fontWeight:"700",margin:"0",color:th.text,letterSpacing:"-0.5px"}},"Money Made"));
  hdrL.appendChild(el("p",{style:{margin:"4px 0 0",fontSize:"12px",color:th.sub}},"Track your wins, stack your bags"));
  const hdrR=el("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});

  const csvBtn=el("button",{style:{width:"34px",height:"34px",borderRadius:"50%",border:"1px solid "+th.border,background:th.card,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>{state.showCSVPanel=!state.showCSVPanel;state.csvMode="export";state.csvText="";render();}});
  csvBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+th.sub+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

  const thBtn=el("button",{style:{width:"34px",height:"34px",borderRadius:"50%",border:"1px solid "+th.border,background:th.card,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>{state.dark=!state.dark;save();render();}});
  thBtn.innerHTML=state.dark?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="'+th.sub+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="'+th.sub+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

  const yrL=el("button",{style:{width:"32px",height:"32px",borderRadius:"50%",border:"1px solid "+th.border,background:th.card,cursor:"pointer",fontSize:"14px",color:th.sub,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>{state.year--;render();}},"\u2190");
  const yrR=el("button",{style:{width:"32px",height:"32px",borderRadius:"50%",border:"1px solid "+th.border,background:th.card,cursor:"pointer",fontSize:"14px",color:th.sub,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>{state.year++;render();}},"\u2192");
  const yrSpan=el("span",{style:{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:"600",color:th.text,minWidth:"48px",textAlign:"center"}},String(state.year));

  hdrR.append(csvBtn,thBtn,yrL,yrSpan,yrR);
  hdr.append(hdrL,hdrR);
  app.appendChild(hdr);

  // CSV Panel
  if(state.showCSVPanel){
    const cp=el("div",{style:{margin:"16px 20px 0",background:th.card,border:"1px solid "+th.border,borderRadius:"14px",padding:"18px",animation:"fadeIn .2s ease"}});
    const tabs=el("div",{style:{display:"flex",background:th.toggleBg,borderRadius:"8px",padding:"2px",marginBottom:"14px",width:"fit-content"}});
    const mkTab=(label,mode)=>el("button",{style:{padding:"5px 14px",borderRadius:"8px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:state.csvMode===mode?"600":"400",background:state.csvMode===mode?th.accent:"transparent",color:state.csvMode===mode?"#FFFCF7":th.sub,fontFamily:"'DM Sans',sans-serif"},onClick:()=>{state.csvMode=mode;state.csvText="";render();}},label);
    tabs.append(mkTab("Export CSV","export"),mkTab("Import CSV","import"));
    cp.appendChild(tabs);

    if(state.csvMode==="export"){
      cp.appendChild(el("p",{style:{fontSize:"12px",color:th.sub,marginBottom:"10px"}},"Export all your data as CSV. Copy to clipboard, download as file, or paste into Google Sheets / Excel."));
      const btns=el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
      btns.appendChild(el("button",{style:{flex:"1",minWidth:"120px",padding:"11px",borderRadius:"8px",border:"none",background:th.accent,color:"#FFFCF7",fontSize:"12px",fontWeight:"600",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},onClick:()=>exportCSV()},"Export to Clipboard"));
      btns.appendChild(el("button",{style:{flex:"1",minWidth:"120px",padding:"11px",borderRadius:"8px",border:"1px solid "+th.accent,background:"transparent",color:th.accent,fontSize:"12px",fontWeight:"600",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},onClick:()=>downloadCSV()},"Download .csv File"));
      btns.appendChild(el("button",{style:{padding:"11px 16px",borderRadius:"8px",border:"1px solid "+th.border,background:"transparent",color:th.sub,fontSize:"12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},onClick:()=>{state.showCSVPanel=false;render();}},"Close"));
      cp.appendChild(btns);
      if(state.csvText){
        const ta=el("textarea",{style:{width:"100%",marginTop:"12px",padding:"10px",borderRadius:"8px",border:"1px solid "+th.inputBorder,background:th.input,color:th.text,fontSize:"11px",fontFamily:"monospace",minHeight:"120px",resize:"vertical",outline:"none",boxSizing:"border-box"},readOnly:"true"});
        ta.value=state.csvText;ta.onclick=()=>ta.select();cp.appendChild(ta);
      }
    } else {
      cp.appendChild(el("p",{style:{fontSize:"12px",color:th.sub,marginBottom:"6px"}},"Paste CSV data below or upload a .csv file \u2014 wins and goals both get imported"));
      cp.appendChild(el("p",{style:{fontSize:"10px",color:th.muted,marginBottom:"10px"}},"Wins: Year,Month,Project,Amount,Source \u2014 Goals: GOAL,Year,Month,Target"));
      const fileLabel=el("label",{style:{display:"inline-flex",alignItems:"center",gap:"6px",padding:"8px 14px",borderRadius:"8px",border:"1px solid "+th.accent,background:"transparent",color:th.accent,fontSize:"11px",fontWeight:"600",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginBottom:"10px"}});
      fileLabel.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload .csv file';
      const fi=el("input",{type:"file",accept:".csv,.txt",style:{display:"none"}});
      fi.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{state.csvText=ev.target.result;state.csvMode="import";render();showToast("File loaded \u2014 click Import Data to apply");};r.readAsText(f);};
      fileLabel.appendChild(fi);cp.appendChild(fileLabel);

      const ta=el("textarea",{style:{width:"100%",padding:"10px",borderRadius:"8px",border:"1px solid "+th.inputBorder,background:th.input,color:th.text,fontSize:"11px",fontFamily:"monospace",minHeight:"120px",resize:"vertical",outline:"none",boxSizing:"border-box"},placeholder:"Year,Month,Project,Amount,Source\n2026,Jan,MyProject,100,Bounties"});
      ta.value=state.csvText;ta.oninput=e=>{state.csvText=e.target.value;};
      cp.appendChild(ta);
      const btns=el("div",{style:{display:"flex",gap:"8px",marginTop:"10px"}});
      btns.appendChild(el("button",{style:{flex:"1",padding:"11px",borderRadius:"8px",border:"none",background:th.accent,color:"#FFFCF7",fontSize:"12px",fontWeight:"600",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},onClick:()=>importCSV()},"Import Data"));
      btns.appendChild(el("button",{style:{padding:"11px 16px",borderRadius:"8px",border:"1px solid "+th.border,background:"transparent",color:th.sub,fontSize:"12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},onClick:()=>{state.showCSVPanel=false;state.csvText="";render();}},"Close"));
      cp.appendChild(btns);
    }
    app.appendChild(cp);
  }

  // Goal Card
  const gc=el("div",{style:{margin:"20px 20px 0",background:th.card,border:"1px solid "+th.border,borderRadius:"14px",padding:"18px"}});
  const gcTop=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"8px"}});
  const gcL=el("div",{});
  gcL.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"600",color:th.text}},dm+" Goal"));
  if(cGoal){
    const sub=el("div",{style:{fontSize:"12px",color:th.sub,marginTop:"2px"}});
    sub.textContent=fmt(cEarned)+" of "+fmt(cGoal);
    if(exceeded){const sp=el("span",{style:{color:th.green,fontWeight:"600"}}," \u2014 Exceeded!");sub.appendChild(sp);}
    gcL.appendChild(sub);
  }else gcL.appendChild(el("div",{style:{fontSize:"12px",color:th.muted,marginTop:"2px"}},"No goal set"));

  const gcR=el("div",{style:{display:"flex",gap:"6px"}});
  if(cGoal)gcR.appendChild(el("button",{style:{padding:"5px 10px",borderRadius:"8px",border:"1px solid "+th.border,background:"transparent",cursor:"pointer",fontSize:"11px",color:th.accent,fontFamily:"'DM Sans',sans-serif"},onClick:()=>{const g={...state.goals};delete g[gk(dm,state.year)];state.goals=g;save();render();}},"Remove"));
  gcR.appendChild(el("button",{style:{padding:"5px 12px",borderRadius:"8px",border:"1px solid "+th.inputBorder,background:th.input,cursor:"pointer",fontSize:"11px",color:th.sub,fontFamily:"'DM Sans',sans-serif",fontWeight:"500"},onClick:()=>{state.goalForm={month:dm,target:cGoal?String(cGoal):""};state.editingGoalKey=cGoal?gk(dm,state.year):null;state.showGoalForm=!state.showGoalForm;render();}},cGoal?"Edit":"Set Goal"));
  gcTop.append(gcL,gcR);gc.appendChild(gcTop);

  // Progress bar
  const bar=el("div",{style:{width:"100%",height:"24px",background:th.barBg,borderRadius:"12px",overflow:"hidden",position:"relative"}});
  const fill=el("div",{style:{width:cGoal?gPct+"%":"0%",height:"100%",background:exceeded?th.greenGrad:th.accentGrad,borderRadius:"12px",transition:"width .8s cubic-bezier(.4,0,.2,1)",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:gPct>15?"10px":"0"}});
  if(cGoal&&gPct>15)fill.appendChild(el("span",{style:{fontSize:"11px",fontWeight:"700",color:"#FFFCF7",textShadow:"0 1px 2px rgba(0,0,0,.2)"}},Math.round(gPct)+"%"));
  bar.appendChild(fill);
  if(cGoal&&gPct<=15)bar.appendChild(el("span",{style:{position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",fontSize:"11px",fontWeight:"600",color:th.sub}},Math.round(gPct)+"%"));
  gc.appendChild(bar);

  // Mini month bars
  const miniRow=el("div",{style:{display:"flex",gap:"3px",marginTop:"12px",flexWrap:"wrap"}});
  MONTHS.forEach(m=>{
    const g=state.goals[gk(m,state.year)];const e=wins.filter(w=>w.month===m).reduce((s,w)=>s+w.amount,0);
    const p=g?Math.min((e/g)*100,100):0;const hit=g&&e>=g;const isA=m===dm;
    const d=el("div",{style:{flex:"1 1 0",minWidth:"24px",cursor:"pointer",textAlign:"center"},onClick:()=>{state.activeMonth=isA&&state.activeMonth===m?null:m;render();}});
    d.appendChild(el("div",{style:{fontSize:"8px",color:isA?th.text:th.muted,fontWeight:isA?"600":"400",marginBottom:"2px"}},m));
    const b=el("div",{style:{height:"5px",background:th.barBg,borderRadius:"3px",overflow:"hidden"}});
    b.appendChild(el("div",{style:{width:g?p+"%":"0%",height:"100%",background:hit?th.green:th.accent,borderRadius:"3px",transition:"width .5s ease"}}));
    d.appendChild(b);miniRow.appendChild(d);
  });
  gc.appendChild(miniRow);

  // Goal form
  if(state.showGoalForm){
    const gf=el("div",{style:{marginTop:"14px",padding:"14px",background:th.input,borderRadius:"10px",animation:"fadeIn .2s ease"}});
    const row=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}});
    const mSel=mkSelect(state.goalForm.month,MONTHS,v=>{state.goalForm.month=v;},"Month",th);
    const tInp=mkInput(state.goalForm.target,"500",v=>{state.goalForm.target=v;},"Target ($)","number",th);
    row.append(mSel,tInp);gf.appendChild(row);
    const btns=el("div",{style:{display:"flex",gap:"8px"}});
    btns.appendChild(el("button",{style:{flex:"1",padding:"10px",borderRadius:"8px",border:"none",background:th.accent,color:"#FFFCF7",fontSize:"12px",fontWeight:"600",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},onClick:()=>{const v=parseFloat(state.goalForm.target);if(isNaN(v)||v<=0)return;state.goals[state.editingGoalKey||gk(state.goalForm.month,state.year)]=v;state.showGoalForm=false;state.editingGoalKey=null;save();render();}},state.editingGoalKey?"Update":"Set Goal"));
    btns.appendChild(el("button",{style:{padding:"10px 14px",borderRadius:"8px",border:"1px solid "+th.border,background:"transparent",color:th.sub,fontSize:"12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},onClick:()=>{state.showGoalForm=false;render();}},"Cancel"));
    gf.appendChild(btns);gc.appendChild(gf);
  }
  app.appendChild(gc);

  // Stats
  const stats=[{label:"Total Earned",value:fmt(totalEarned),ac:th.accent},{label:"Total Deals",value:wins.length,ac:th.sub},{label:"Best Month",value:bestMonth,ac:state.dark?"#C0724D":"#A0522D"},{label:"Top Source",value:topSource,ac:state.dark?"#DEB88A":"#D4A574"}];
  const sg=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"10px",padding:"18px 20px 0"}});
  stats.forEach(s=>{
    const c=el("div",{style:{background:th.card,border:"1px solid "+th.border,borderRadius:"12px",padding:"14px 16px",position:"relative",overflow:"hidden"}});
    c.appendChild(el("div",{style:{position:"absolute",top:"0",left:"0",width:"3px",height:"100%",background:s.ac,borderRadius:"12px 0 0 12px"}}));
    c.appendChild(el("div",{style:{fontSize:"10px",color:th.sub,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"5px"}},s.label));
    c.appendChild(el("div",{style:{fontSize:"17px",fontWeight:"700",color:th.accent,wordBreak:"break-word"}},String(s.value)));
    sg.appendChild(c);
  });
  app.appendChild(sg);

  // Chart
  const chartCard=el("div",{style:{margin:"18px 20px 0",background:th.card,border:"1px solid "+th.border,borderRadius:"14px",padding:"18px 12px 14px"}});

function renderChart(th,wins){
  const ctx=document.getElementById("mainChart");
  if(!ctx)return;
  if(chart){chart.destroy();chart=null;}
  const data=MONTHS.map(m=>parseFloat(wins.filter(w=>w.month===m).reduce((s,w)=>s+w.amount,0).toFixed(2)));
  const type=state.chartType.toLowerCase();

  if(type==="pie"){
    const srcMap={};wins.forEach(w=>{srcMap[w.source]=(srcMap[w.source]||0)+w.amount;});
    const labels=Object.keys(srcMap);const vals=Object.values(srcMap);
    const PIE_COLORS=["#C4956A","#4A90D9","#6B8E5A","#D45B5B","#8B5CF6","#E6A23C","#2DD4BF","#EC4899","#F97316","#64748B","#A0522D","#06B6D4"];
    const colors=labels.map((l,i)=>PIE_COLORS[i%PIE_COLORS.length]);
    if(labels.length===0){labels.push("No Data");vals.push(1);colors.push(th.barBg);}
    chart=new Chart(ctx,{type:"doughnut",data:{labels,datasets:[{data:vals,backgroundColor:colors,borderColor:th.card,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:30,bottom:10,left:10,right:10}},plugins:{legend:{display:true,position:"bottom",labels:{color:th.sub,font:{family:"'DM Sans',sans-serif",size:10},usePointStyle:true,pointStyle:"circle",padding:14}},tooltip:{callbacks:{label:function(i){var t=i.dataset.data.reduce(function(a,b){return a+b},0);var p=Math.round(i.parsed/t*100);return i.label+": "+fmt(i.parsed)+" ("+p+"%)";}}}}},plugins:[{id:"pieLabels",afterDraw:function(c){var ctx2=c.ctx;var meta=c.getDatasetMeta(0);if(!meta||!meta.data)return;ctx2.save();ctx2.font="10px 'DM Sans',sans-serif";ctx2.textBaseline="middle";meta.data.forEach(function(arc,i){if(i>=labels.length)return;var model=arc.tooltipPosition();var cx=c.width/2;var cy=c.height/2;var angle=((arc.startAngle+arc.endAngle)/2);var radius=arc.outerRadius+16;var x2=cx+Math.cos(angle)*radius;var y2=cy+Math.sin(angle)*radius;var x3=x2+(x2>cx?12:-12);ctx2.beginPath();ctx2.moveTo(model.x,model.y);ctx2.lineTo(x2,y2);ctx2.lineTo(x3,y2);ctx2.strokeStyle=th.sub;ctx2.lineWidth=1;ctx2.stroke();ctx2.fillStyle=th.text;ctx2.textAlign=x2>cx?"left":"right";ctx2.fillText(labels[i],x3+(x2>cx?4:-4),y2);});ctx2.restore();}}]});
    return;
  }
  if(type==="radar"){
    chart=new Chart(ctx,{type:"radar",data:{labels:MONTHS,datasets:[{label:"Earnings",data,backgroundColor:th.accent+"30",borderColor:th.accent,borderWidth:2,pointBackgroundColor:th.accent}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{grid:{color:th.border},angleLines:{color:th.border},ticks:{display:false},pointLabels:{color:th.sub,font:{family:"'DM Sans',sans-serif",size:10}}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>fmt(i.parsed.r)}}}}});
    return;
  }
  const chartType=type==="area"?"line":"bar";

// CSV
function exportCSV(){
  if(state.wins.length===0&&Object.keys(state.goals).length===0){showToast("Nothing to export yet");return;}
  const rows=["Year,Month,Project,Amount,Source"];
  [...state.wins].sort((a,b)=>a.year-b.year||MONTHS.indexOf(a.month)-MONTHS.indexOf(b.month)).forEach(w=>{
    const proj=w.project.includes(",")?'"'+w.project+'"':w.project;
    rows.push(w.year+","+w.month+","+proj+","+w.amount+","+w.source);
  });
  const ge=Object.entries(state.goals).sort();
  if(ge.length>0){rows.push("");rows.push("GOAL,Year,Month,Target");ge.forEach(([k,t])=>{const[yr,mo]=k.split("-");rows.push("GOAL,"+yr+","+mo+","+t);});}
  state.csvText=rows.join("\n");state.csvMode="export";state.showCSVPanel=true;
  try{navigator.clipboard.writeText(state.csvText);showToast("CSV copied to clipboard");}catch(e){showToast("CSV ready \u2014 copy from the box");}
  render();
}
function downloadCSV(){
  if(!state.csvText)exportCSV();
  if(!state.csvText)return;
  const blob=new Blob([state.csvText],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="wins-tracker-"+state.year+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast("CSV file downloaded");
}
function importCSV(){
  if(!state.csvText.trim()){showToast("Paste your CSV data first");return;}
  // Normalize: detect delimiter (tab, semicolon, or comma)
  const raw=state.csvText.trim();
  const firstLine=raw.split("\n")[0];
  const delim=firstLine.includes("\t")?"\t":firstLine.includes(";")?";":",";
  const lines=raw.split("\n");
  const nw=[],ns=[];const ng={};let sk=0,gc=0;
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();if(!line)continue;
    const lower=line.toLowerCase();
    // Skip header rows
    if(lower.startsWith("year"+delim+"month")||lower.startsWith("year,month")||lower.startsWith("year;month")||lower.startsWith("year\tmonth"))continue;
    if(lower.startsWith("goal"+delim+"year")||lower.startsWith("goal,year")||lower.startsWith("goal;year")||lower.startsWith("goal\tyear"))continue;
    // Parse GOAL rows (case-insensitive)
    if(lower.startsWith("goal"+delim)||lower.startsWith("goal,")||lower.startsWith("goal;")||lower.startsWith("goal\t")){
      const p=line.split(delim.length?delim:",");
      if(p.length>=4){const yr=parseInt(p[1]),mo=p[2].trim(),t=parseFloat(p[3]);
        if(!isNaN(yr)&&!isNaN(t)&&MONTHS.includes(mo)){ng[yr+"-"+mo]=t;gc++;continue;}}
      sk++;continue;
    }
    // Parse win rows — handle quoted fields
    let parts;
    if(line.includes('"')){
      const sep=delim==="," ? "," : delim;
      const re=new RegExp("^(\\d+)"+escRe(sep)+"(\\w+)"+escRe(sep)+'"([^"]+)"'+escRe(sep)+"([^"+escRe(sep)+"]+)(?:"+escRe(sep)+"(.+))?$");
      const m=line.match(re);
      if(m)parts=[m[1],m[2],m[3],m[4],m[5]||""];else{sk++;continue;}
    }else{
      parts=line.split(delim);
    }
    if(parts.length<4){sk++;continue;}
    const yr=parseInt(parts[0]),mo=parts[1].trim(),proj=parts[2].trim(),amt=parseFloat(parts[3]),src=parts.length>=5&&parts[4].trim()?parts[4].trim():"Other";
    if(isNaN(yr)||isNaN(amt)||!proj||!MONTHS.includes(mo)){sk++;continue;}
    if(src&&!state.sources.includes(src)&&!ns.includes(src))ns.push(src);
    nw.push({id:gid(),year:yr,month:mo,project:proj,amount:amt,source:src});
  }
  if(nw.length===0&&gc===0){showToast("No valid rows found \u2014 check format");return;}
  if(ns.length>0)state.sources.push(...ns);
  if(nw.length>0)state.wins.push(...nw);
  if(gc>0)Object.assign(state.goals,ng);
  const mp=[];if(nw.length)mp.push(nw.length+" wins");if(gc)mp.push(gc+" goals");if(ns.length)mp.push(ns.length+" new sources");
  showToast("Imported "+mp.join(" + ")+(sk>0?" ("+sk+" skipped)":""));
  state.csvText="";state.showCSVPanel=false;save();render();
}
